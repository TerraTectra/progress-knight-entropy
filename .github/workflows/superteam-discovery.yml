name: Superteam Agent Discovery

on:
  pull_request:
    branches: [main]
    types: [opened]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out private workspace
        uses: actions/checkout@v4

      - name: Register agent and fetch eligible listings
        env:
          AGENT_NAME: "Terra Nightstalker eff772"
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          python -m pip install --quiet cryptography
          cat > /tmp/discover.py <<'PYCODE'
          import base64
          import json
          import os
          import urllib.parse
          import urllib.request
          from datetime import datetime, timezone
          from pathlib import Path

          from cryptography.fernet import Fernet
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding

          BASE = "https://superteam.fun"
          UA = "Terra-Nightstalker/1.0"
          PUBLIC_KEY = b"""-----BEGIN PUBLIC KEY-----
MIIBojANBgkqhkiG9w0BAQEFAAOCAY8AMIIBigKCAYEAzpqeWu8i0Nr1xj3Ax/l1
7NuDBWpaXjYX8e3BRr7XJt7mySLUL4fPzihoHc/Yj7GO6+bWz8hiOGE9Ah7BO0Sy
CTxuHQVKOvihwkp9SRCME5BmlAqkDmeGK/nLyUX6P6kvX63sjfVKGPlFpf6itb4F
+qZiaXJDL3tR4NPy0R1RaxOlh/rXBrJkT2IRLkttEog9vPkri5n6PCaPvtti3aRN
7dCOAO6salFXDnQVhqMEYAb3quLh1axjER+s6ZvRNBNRG6fr9o+8gg7P7OuMfP1E
dZTVX5pri5B0OBPZs/5UwXWDq4sQkQE56YQTl1UmKymCapCIuowiGtDKI0nuprFK
4o++2bxqDUS72Ei2cU4qtVd2a4/zPLxyzJJCQ261z6BTXmNxfNVtAbD22vcG0n9b
PyEZzZ8lqHmB4GpPevlU7tDP9ZT96vSVLiyd6JZo4PawJIes+6cNMVlQ2/wLJTdb
vnevpugcaeiU4FqLvPs7BE7CKV9NOciwhYG/be8dE2C3AgMBAAE=
-----END PUBLIC KEY-----
"""

          def request_json(url, method="GET", data=None, token=None):
              headers = {"Accept": "application/json", "User-Agent": UA}
              body = None
              if data is not None:
                  headers["Content-Type"] = "application/json"
                  body = json.dumps(data).encode("utf-8")
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, data=body, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=45) as response:
                  raw = response.read()
              return json.loads(raw.decode("utf-8"))

          registration = request_json(
              f"{BASE}/api/agents",
              method="POST",
              data={"name": os.environ["AGENT_NAME"]},
          )
          api_key = registration.get("apiKey") or registration.get("api_key")
          if not api_key:
              raise RuntimeError("Registration response did not include an API key")

          query = urllib.parse.urlencode({
              "take": 50,
              "deadline": "2026-12-31",
          })
          live = request_json(f"{BASE}/api/agents/listings/live?{query}", token=api_key)

          slugs = []
          seen = set()
          def collect(value):
              if isinstance(value, dict):
                  slug = value.get("slug")
                  if isinstance(slug, str) and slug and slug not in seen:
                      seen.add(slug)
                      slugs.append(slug)
                  for child in value.values():
                      collect(child)
              elif isinstance(value, list):
                  for child in value:
                      collect(child)
          collect(live)

          details = {}
          detail_errors = {}
          for slug in slugs[:50]:
              try:
                  safe_slug = urllib.parse.quote(slug, safe="")
                  details[slug] = request_json(
                      f"{BASE}/api/agents/listings/details/{safe_slug}",
                      token=api_key,
                  )
              except Exception as exc:
                  detail_errors[slug] = type(exc).__name__

          bundle = {
              "fetchedAt": datetime.now(timezone.utc).isoformat(),
              "registration": registration,
              "live": live,
              "details": details,
              "detailErrors": detail_errors,
          }
          plaintext = json.dumps(bundle, ensure_ascii=False, separators=(",", ":")).encode("utf-8")

          fernet_key = Fernet.generate_key()
          ciphertext = Fernet(fernet_key).encrypt(plaintext)
          public_key = serialization.load_pem_public_key(PUBLIC_KEY)
          encrypted_key = public_key.encrypt(
              fernet_key,
              padding.OAEP(
                  mgf=padding.MGF1(algorithm=hashes.SHA256()),
                  algorithm=hashes.SHA256(),
                  label=None,
              ),
          )
          envelope = {
              "alg": "RSA-OAEP-SHA256+Fernet",
              "encryptedKey": base64.b64encode(encrypted_key).decode("ascii"),
              "ciphertext": ciphertext.decode("ascii"),
          }
          out = Path("superteam-secure/result.enc.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(envelope, separators=(",", ":")), encoding="utf-8")
          PYCODE
          python /tmp/discover.py
          rm -f /tmp/discover.py

      - name: Upload encrypted discovery result
        uses: actions/upload-artifact@v4
        with:
          name: superteam-encrypted
          path: superteam-secure/result.enc.json
          retention-days: 1
          if-no-files-found: error
