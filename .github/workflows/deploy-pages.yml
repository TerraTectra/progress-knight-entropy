name: Deploy Progress Knight Reality Break

on:
  push:
    branches:
      - main
    paths:
      - 'pk-reality-break/**'
      - '.github/workflows/deploy-pages.yml'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: pk-reality-break
      - name: Build
        run: npm run build
        working-directory: pk-reality-break
      - name: Deploy to GitHub Pages subdirectory
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: pk-reality-break/dist
          publish_branch: gh-pages
          destination_dir: pk-reality-break
          keep_files: true
