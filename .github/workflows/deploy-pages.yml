name: Build Progress Knight Reality Break

on:
  push:
    branches:
      - main
    paths:
      - 'pk-reality-break/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: write

jobs:
  build-and-publish-root:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: pk-reality-break
      - name: Build
        run: npm run build
        working-directory: pk-reality-break
      - name: Publish built app to repository root
        run: |
          rm -rf assets reality-break css js img fonts scripts data docs
          rm -f index.html favicon.ico manifest.json service-worker.js sw.js
          cp -R pk-reality-break/dist/. ./
          touch .nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Publish Reality Break root build"
          git push
