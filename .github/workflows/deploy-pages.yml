name: Build Progress Knight Reality Break

on:
  push:
    branches:
      - main
    paths:
      - 'pk-reality-break/**'
      - '.github/workflows/deploy-pages.yml'

permissions:
  contents: write

jobs:
  build-and-publish-subdir:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
        working-directory: pk-reality-break
      - name: Build
        run: npm run build
        working-directory: pk-reality-break
      - name: Publish built app to main subdirectory
        run: |
          rm -rf reality-break
          mkdir -p reality-break
          cp -R pk-reality-break/dist/. reality-break/
          touch reality-break/.nojekyll
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reality-break
          git diff --cached --quiet || git commit -m "Publish Reality Break build"
          git push
