name: Validate Pulse90

on:
  pull_request:
    branches:
      - main
    paths:
      - txline-pulse/**
      - .github/workflows/pulse90-validate.yml
  push:
    branches:
      - main
    paths:
      - txline-pulse/**
      - .github/workflows/pulse90-validate.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Validate public snapshot and static assets
        working-directory: txline-pulse
        run: npm run validate
